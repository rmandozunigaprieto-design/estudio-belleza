<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; }
        header { background-color: #ff9cbd; padding: 40px; border-radius: 20px; margin-bottom: 20px; }
        .ruleta { width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(red, yellow, green, blue, purple); margin: 20px auto; transition: transform 4s ease-out; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 25px; border: none; cursor: pointer; background: #5c001f; color: white; font-weight: bold; }
        .seccion { background: white; margin: 10px auto; padding: 15px; border-radius: 20px; width: 90%; max-width: 400px; cursor: pointer; }
        .contenido { display: none; padding-top: 10px; color: #4a1525; }
    </style>
</head>
<body>

    <header><h1>Estudio de Belleza Armaliet</h1></header>

    <div class="ruleta" id="ruleta"></div>
    <button class="btn" onclick="probarGiro()">¡Girar!</button>

    <div class="seccion" onclick="hacerToggle(this)">
        <div>▼ Políticas</div>
        <div class="contenido">50% anticipo.</div>
    </div>

    <div class="seccion" onclick="hacerToggle(this)">
        <div>▼ Pestañas</div>
        <div class="contenido">Clásicas: $450</div>
    </div>

    <button class="btn" onclick="window.open('https://wa.me/524443372745', '_blank')">Agendar Cita</button>

    <script>
        console.log("Script cargado correctamente");

        function hacerToggle(el) {
            let contenido = el.querySelector('.contenido');
            if (contenido.style.display === "block") {
                contenido.style.display = "none";
            } else {
                contenido.style.display = "block";
            }
        }

        let grados = 0;
        function probarGiro() {
            const ruleta = document.getElementById('ruleta');
            grados += 1440 + Math.floor(Math.random() * 360);
            ruleta.style.transform = "rotate(" + grados + "deg)";
            alert("¡Girando!");
        }
    </script>
</body>
</html>
