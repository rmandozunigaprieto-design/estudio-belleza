<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Pantalla de Carga */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ff9cbd; display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; font-family: 'Pacifico', cursive; font-size: 1.5em; animation: fadeOut 1s forwards 2s; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .fade-in { animation: fadeInAnimation 1.5s ease-in; }
        @keyframes fadeInAnimation { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Botón WhatsApp Flotante con Pulsación */
        .float-whatsapp { position: fixed; bottom: 30px; right: 30px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; animation: pulse 2s infinite; text-decoration: none; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        header { background-color: #ff9cbd; padding: 45px 20px 20px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; position: relative; margin-top: 40px; }
        .logo-estudio { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); object-fit: cover; }
        h1 { color: #5c001f; margin: 0; font-family: 'Pacifico', cursive; font-size: 2.2em; }
        
        /* La Ruleta */
        .contenedor-ruleta { display: flex; flex-direction: column; align-items: center; margin: 20px auto; position: relative; z-index: 10; }
        .flecha { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #5c001f; position: absolute; top: -15px; z-index: 15; }
        .ruleta { width: 250px; height: 250px; border-radius: 50%; background: conic-gradient(#ff6f9c 0deg 72deg, #ff9cbd 72deg 144deg, #ffb6c1 144deg 216deg, #e62e6b 216deg 288deg, #5c001f 288deg 360deg); border: 5px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.2); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .boton-girar { margin-top: 20px; padding: 15px 40px; background: #e62e6b; color: white; border: none; border-radius: 50px; font-family: 'Pacifico', cursive; font-size: 1.2em; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .boton-girar:hover { background: #5c001f; transform: scale(1.05); }

        /* Efecto Cristal (Glassmorphism) */
        .seccion { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); margin: 15px auto; width: 90%; max-width: 500px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; position: relative; z-index: 10; }
        .titulo-seccion { color: #5c001f; padding: 18px; font-weight: bold; font-family: 'Pacifico', cursive; font-size: 1.2em; cursor: pointer; }
        .contenido { display: none; padding: 0 20px 20px 20px; color: #4a1525; text-align: left; }

        /* Carrusel Adaptable */
        .titulo-galeria { color: #5c001f; font-family: 'Pacifico', cursive; font-size: 1.8em; margin-top: 40px; }
        .slider { width: 100%; max-width: 1000px; height: 200px; margin: 20px auto; overflow: hidden; background: rgba(255, 255, 255, 0.3); border-radius: 20px; }
        .slide-track { display: flex; animation: scroll 25s linear infinite; width: calc(200px * 16); }
        .slide { width: 200px; height: 200px; flex-shrink: 0; padding: 10px; }
        .slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-800px); } }

        /* Botones */
        .boton-base { padding: 15px 30px; font-size: 1.1em; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px auto; display: block; font-family: 'Pacifico', cursive; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .boton-cotiza { background-color: #ff6f9c; color: white; }
        .boton-cita { background-color: #5c001f; color: white; padding: 18px 40px; font-size: 1.2em; margin: 30px auto; }
    </style>
</head>
<body class="fade-in">
    <div id="loader">Bienvenidos al estudio de belleza de Armaliet ✨</div>

    <!-- Botón WhatsApp Flotante -->
    <a href="https://wa.me/524443372745?text=¡Hola!%20Vengo%20de%20la%20página%20y%20me%20gustaría%20información." class="float-whatsapp" target="_blank">💬</a>

    <header>
        <img src="Logo.jpg" alt="Logo" class="logo-estudio">
        <h1>Estudio Armaliet</h1>
    </header>

    <div class="contenedor-ruleta">
        <div class="flecha"></div>
        <div class="ruleta" id="ruleta"></div>
        <button class="boton-girar" onclick="girar()">¡Girar Ruleta!</button>
        <button class="boton-base boton-cotiza" onclick="window.open('https://wa.me/524443372745?text=Hola!%20Me%20gustaría%20cotizar%20un%20servicio.', '_blank')">Cotiza tu tratamiento ✨</button>
    </div>

    <h2 class="titulo-galeria">Nuestro Trabajo</h2>
    <div class="slider">
        <div class="slide-track">
            <div class="slide"><img src="Logo.jpg" alt="Foto"></div>
            <div class="slide"><img src="Logo.jpg" alt="Foto"></div>
            <div class="slide"><img src="Logo.jpg" alt="Foto"></div>
            <div class="slide"><img src="Logo.jpg" alt="Foto"></div>
        </div>
    </div>

    <div class="seccion">
        <div class="titulo-seccion" onclick="abrirSeccion(this)">▼ Políticas de Citas</div>
        <div class="contenido">• Anticipo del 50%.<br>• Tolerancia máxima 10 min.</div>
    </div>
    <div class="seccion">
        <div class="titulo-seccion" onclick="abrirSeccion(this)">▼ Pestañas</div>
        <div class="contenido">• Clásicas: $450<br>• Volumen Ruso: $650</div>
    </div>
    <div class="seccion">
        <div class="titulo-seccion" onclick="abrirSeccion(this)">▼ Uñas</div>
        <div class="contenido">• Set Básico: $350<br>• Acrílico: $500</div>
    </div>

    <button class="boton-base boton-cita" onclick="window.open('https://wa.me/524443372745?text=¡Hola!%20Vengo%20de%20la%20página%20y%20quiero%20agendar%20una%20cita.', '_blank')">Agendar Cita Ahora</button>

    <script>
        function abrirSeccion(el) {
            let cont = el.nextElementSibling;
            cont.style.display = (cont.style.display === "block") ? "none" : "block";
        }
        function girar() {
            document.getElementById('ruleta').style.transform = "rotate(" + (1440 + Math.random() * 360) + "deg)";
        }
    </script>
</body>
</html>
