<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #ffb6c1; text-align: center; padding: 20px; }
        header { background-color: #ff9cbd; padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .logo-estudio { width: 80px; border-radius: 50%; border: 4px solid white; }
        
        .contenedor-ruleta { margin: 20px 0; }
        .ruleta { width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(red, yellow, blue); margin: 0 auto; transition: transform 4s; }
        
        /* ESTO ES LA GALERÍA DE PRUEBA - TIENE QUE VERSE EL BORDE ROJO */
        .galeria-debug { 
            border: 5px solid red; 
            margin: 30px 0; 
            padding: 20px; 
            background: white; 
            display: flex; 
            overflow-x: scroll; 
            gap: 10px;
        }
        .foto-test { width: 150px; height: 150px; background: grey; border-radius: 10px; }
        
        .seccion { background: white; margin: 15px auto; padding: 15px; border-radius: 20px; }
        .boton { padding: 15px 30px; background: #5c001f; color: white; border: none; border-radius: 20px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <header>
        <img src="Logo.jpg" alt="Logo" class="logo-estudio">
        <h1>Estudio Armaliet</h1>
    </header>

    <div class="contenedor-ruleta">
        <div class="ruleta" id="ruleta"></div>
        <button class="boton" onclick="girar()">¡Girar!</button>
    </div>

    <!-- AQUÍ ESTÁ LA GALERÍA - TIENE QUE SALIR UN BORDE ROJO -->
    <div class="galeria-debug">
        <h2>GALERÍA DE PRUEBA:</h2>
        <img src="Logo.jpg" class="foto-test">
        <img src="Logo.jpg" class="foto-test">
        <img src="Logo.jpg" class="foto-test">
    </div>

    <div class="seccion" onclick="this.querySelector('.contenido').style.display='block'">
        <div>▼ Servicios</div>
        <div class="contenido" style="display:none;">Pestañas y Uñas</div>
    </div>

    <button class="boton" onclick="window.open('https://wa.me/524443372745', '_blank')">Agendar</button>

    <script>
        function girar() { document.getElementById('ruleta').style.transform = "rotate(1440deg)"; }
    </script>
</body>
</html>
