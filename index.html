<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Armaliet V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        header { background-color: #ff9cbd; padding: 70px 20px 20px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        .ruleta { width: 250px; height: 250px; border-radius: 50%; background: conic-gradient(#ff6f9c 0deg 72deg, #ff9cbd 72deg 144deg, #ffb6c1 144deg 216deg, #e62e6b 216deg 288deg, #5c001f 288deg 360deg); border: 5px solid white; margin: 20px auto; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .boton { padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Pacifico', cursive; margin: 10px; background: #5c001f; color: white; }
        .seccion { background: white; margin: 15px auto; padding: 20px; border-radius: 50px; width: 90%; max-width: 500px; cursor: pointer; }
        .contenido { display: none; margin-top: 10px; color: #5c001f; }
        .mostrar { display: block !important; }
    </style>
</head>
<body>

    <header><h1>Estudio Armaliet V2</h1></header>

    <div class="ruleta" id="ruleta"></div>
    <button class="boton" onclick="girar()">¡Girar Ruleta!</button>

    <div class="seccion" onclick="toggle(this)">
        <div>▼ Políticas</div>
        <div class="contenido">50% anticipo.</div>
    </div>
    
    <div class="seccion" onclick="toggle(this)">
        <div>▼ Servicios</div>
        <div class="contenido">Pestañas y Uñas disponibles.</div>
    </div>

    <button class="boton" onclick="window.open('https://wa.me/524443372745', '_blank')">Agendar</button>

    <script>
        function toggle(el) {
            el.querySelector('.contenido').classList.toggle('mostrar');
        }
        
        let rotacion = 0;
        function girar() {
            rotacion += 1440 + Math.floor(Math.random() * 360);
            document.getElementById('ruleta').style.transform = rotate(${rotacion}deg);
            setTimeout(() => alert("¡Giro completado!"), 4000);
        }
    </script>
</body>
</html>
