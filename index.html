<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        header { background-color: #ff9cbd; padding: 90px 20px 30px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        
        .logo-estudio { 
            position: absolute; top: 15px; left: 15px; max-width: 60px; 
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        h1 { color: #5c001f; margin: 0; font-family: 'Pacifico', cursive; font-size: 2.2em; }
        
        /* ANIMACIÓN LOCA (3 Segundos para que sea fluida) */
        @keyframes moverseLoco {
            0% { transform: translate(0, 0); }
            25% { transform: translate(10px, -10px); }
            50% { transform: translate(-10px, 10px); }
            75% { transform: translate(10px, 5px); }
            100% { transform: translate(0, 0); }
        }

        /* Estilo de los botones largos */
        .seccion { 
            background: white; 
            margin: 15px auto; 
            width: 90%; max-width: 500px; 
            border-radius: 50px; /* Redondeado tipo cápsula */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            cursor: pointer;
            animation: moverseLoco 3s ease-in-out infinite;
        }
        
        .titulo-seccion { 
            color: #e62e6b; padding: 18px; font-weight: bold; font-family: 'Pacifico', cursive; font-size: 1.2em;
        }
        
        .contenido { display: none; padding: 0 20px 20px 20px; color: #4a1525; font-size: 1em; line-height: 1.5; }
        
        /* Botón de Agendar (Animado) */
        .boton-cita { 
            background-color: #5c001f; color: white; border: none; padding: 18px 35px; 
            font-size: 1.2em; font-weight: bold; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); margin: 30px auto; display: block;
            font-family: 'Pacifico', cursive;
            animation: moverseLoco 3s ease-in-out infinite;
        }
        
        /* Si ponen el mouse/dedo, se detiene la animación y crece un poco */
        .seccion:hover, .boton-cita:hover { 
            animation: none; 
            transform: scale(1.03); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .flor { position: fixed; top: -10%; color: white; font-size: 1.5em; z-index: 1; pointer-events: none; animation: caer linear forwards; }
        @keyframes caer { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <header>
        <img src="Logo.jpg" alt="Logo Estudio" class="logo-estudio">
        <h1>Estudio de Belleza Armaliet</h1>
    </header>

    <div class="seccion" onclick="toggle(this)">
        <div class="titulo-seccion">▼ Políticas de Citas</div>
        <div class="contenido">Anticipo del 50%.<br>Tolerancia máxima 10 min.<br>Favor de avisar con 24h de anticipación.</div>
    </div>

    <div class="seccion" onclick="toggle(this)">
        <div class="titulo-seccion">▼ Pestañas</div>
        <div class="contenido">Clásicas: $450<br>Volumen Ruso: $650<br>Lifting: $400</div>
    </div>

    <div class="seccion" onclick="toggle(this)">
        <div class="titulo-seccion">▼ Uñas</div>
        <div class="contenido">Set Básico: $350<br>Acrílico: $500<br>Gelish: $250</div>
    </div>

    <button class="boton-cita" onclick="alert('¡Próximamente agendador de citas!')">Agendar Cita Ahora</button>

    <script>
        function toggle(el) {
            let contenido = el.querySelector('.contenido');
            contenido.style.display = (contenido.style.display === "block") ? "none" : "block";
        }
        function crearFlor() {
            const flor = document.createElement('div');
            flor.classList.add('flor');
            flor.innerText = '✿';
            flor.style.left = Math.random() * 100 + 'vw';
            flor.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(flor);
            setTimeout(() => { flor.remove(); }, 8000);
        }
        setInterval(crearFlor, 1000);
    </script>
</body>
</html>
