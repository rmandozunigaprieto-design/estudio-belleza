<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 15px; overflow-x: hidden; }
        
        header { background-color: #ff9cbd; padding: 70px 20px 20px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        
        .logo-estudio { 
            position: absolute; top: 10px; left: 10px; max-width: 50px; 
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.6); 
        }
        
        h1 { color: #5c001f; margin: 0; font-family: 'Pacifico', cursive; font-size: 1.8em; }
        
        /* Animación Loca (3 Segundos) */
        @keyframes moverseLoco {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, 5px); }
            75% { transform: translate(5px, 3px); }
            100% { transform: translate(0, 0); }
        }

        /* Contenedor de servicios en horizontal */
        .contenedor-servicios { 
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
        }

        .seccion { 
            background: white; 
            width: 30%; /* Tamaño ajustado para caber 3 en horizontal */
            min-height: 90px;
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: moverseLoco 3s ease-in-out infinite;
            cursor: pointer;
        }
        
        .titulo-seccion { 
            color: #e62e6b; font-weight: bold; font-family: 'Pacifico', cursive; font-size: 0.85em; padding: 5px;
        }
        
        .contenido { display: none; padding: 5px; color: #4a1525; font-size: 0.7em; }
        
        .boton-cita { 
            background-color: #5c001f; color: white; border: none; padding: 15px 30px; 
            font-size: 1em; font-weight: bold; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            font-family: 'Pacifico', cursive;
            animation: moverseLoco 3s ease-in-out infinite;
        }
        
        .seccion:hover, .boton-cita:hover { animation: none; transform: scale(1.05); }

        .flor { position: fixed; top: -10%; color: white; font-size: 1.2em; z-index: 1; pointer-events: none; animation: caer linear forwards; }
        @keyframes caer { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <header>
        <img src="Logo.jpg" alt="Logo Estudio" class="logo-estudio">
        <h1>Estudio de Belleza Armaliet</h1>
    </header>

    <div class="contenedor-servicios">
        <div class="seccion" onclick="toggle(this)">
            <div class="titulo-seccion">Políticas</div>
            <div class="contenido">Anticipo 50%.<br>Tolerancia 10min.<br>Avisar 24h antes.</div>
        </div>
        <div class="seccion" onclick="toggle(this)">
            <div class="titulo-seccion">Pestañas</div>
            <div class="contenido">Clásicas: $450<br>Vol: $650<br>Lift: $400</div>
        </div>
        <div class="seccion" onclick="toggle(this)">
            <div class="titulo-seccion">Uñas</div>
            <div class="contenido">Básico: $350<br>Escult: $500<br>Gel: $250</div>
        </div>
    </div>

    <button class="boton-cita" onclick="alert('¡Próximamente agendador de citas!')">Agendar Cita Ahora</button>

    <script>
        function toggle(el) {
            let contenido = el.querySelector('.contenido');
            let titulo = el.querySelector('.titulo-seccion');
            if (contenido.style.display === "block") {
                contenido.style.display = "none";
                el.style.height = "90px";
            } else {
                contenido.style.display = "block";
                el.style.height = "auto";
            }
        }
        function crearFlor() {
            const flor = document.createElement('div');
            flor.classList.add('flor');
            flor.innerText = '✿';
            flor.style.left = Math.random() * 100 + 'vw';
            flor.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(flor);
            setTimeout(() => { flor.remove(); }, 8000);
        }
        setInterval(crearFlor, 1000);
    </script>
</body>
</html>
