<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        header { background-color: #ff9cbd; padding: 90px 20px 30px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        
        .logo-estudio { 
            position: absolute; top: 15px; left: 15px; max-width: 60px; 
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        h1 { color: #5c001f; margin: 0; font-family: 'Pacifico', cursive; font-size: 2.2em; }
        
        /* ANIMACIÓN LOCA (3 Segundos) */
        @keyframes moverseLoco {
            0% { transform: translate(0, 0); }
            25% { transform: translate(15px, -15px); }
            50% { transform: translate(-15px, 15px); }
            75% { transform: translate(15px, 10px); }
            100% { transform: translate(0, 0); }
        }

        /* Cuadros de Servicios (ahora cuadrados y animados) */
        .seccion { 
            background: white; 
            display: inline-block;
            width: 140px; height: 140px; 
            margin: 15px; 
            border-radius: 20px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); 
            vertical-align: top;
            animation: moverseLoco 3s ease-in-out infinite;
        }
        
        .titulo-seccion { 
            background: #e62e6b; color: white; padding: 10px; cursor: pointer; 
            font-weight: bold; font-family: 'Pacifico', cursive; height: 120px;
            display: flex; align-items: center; justify-content: center; border-radius: 20px;
        }
        
        .contenido { display: none; padding: 10px; color: #4a1525; font-size: 0.9em; }
        
        /* Botón de Agendar (Animado) */
        .boton-cita { 
            background-color: #5c001f; color: white; border: none; padding: 18px 35px; 
            font-size: 1.2em; font-weight: bold; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); margin-top: 30px; display: block; margin: 30px auto;
            font-family: 'Pacifico', cursive;
            animation: moverseLoco 3s ease-in-out infinite;
        }
        .boton-cita:hover, .seccion:hover { animation: none; transform: scale(1.1); }

        .flor { position: fixed; top: -10%; color: white; font-size: 1.5em; z-index: 1; pointer-events: none; animation: caer linear forwards; }
        @keyframes caer { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <header>
        <img src="Logo.jpg" alt="Logo Estudio" class="logo-estudio">
        <h1>Estudio de Belleza Armaliet</h1>
    </header>

    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        
        <div class="seccion">
            <div class="titulo-seccion" onclick="toggle(this)">▼ Políticas</div>
            <div class="contenido">50% anticipo. Tolerancia 10 min. Avisar 24h antes.</div>
        </div>

        <div class="seccion">
            <div class="titulo-seccion" onclick="toggle(this)">▼ Pestañas</div>
            <div class="contenido">Clásicas: $450<br>Volumen: $650<br>Lifting: $400</div>
        </div>

        <div class="seccion">
            <div class="titulo-seccion" onclick="toggle(this)">▼ Uñas</div>
            <div class="contenido">Básico: $350<br>Escultural: $500<br>Gelish: $250</div>
        </div>

    </div>

    <button class="boton-cita" onclick="alert('¡Próximamente agendador de citas!')">Agendar Cita Ahora</button>

    <script>
        function toggle(el) {
            let contenido = el.nextElementSibling;
            contenido.style.display = (contenido.style.display === "block") ? "none" : "block";
            // Ajustamos altura si se abre
            el.parentElement.style.height = (contenido.style.display === "block") ? "auto" : "140px";
        }
        function crearFlor() {
            const flor = document.createElement('div');
            flor.classList.add('flor');
            flor.innerText = '✿';
            flor.style.left = Math.random() * 100 + 'vw';
            flor.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(flor);
            setTimeout(() => { flor.remove(); }, 8000);
        }
        setInterval(crearFlor, 1000);
    </script>
</body>
</html>
