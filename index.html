<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza Armaliet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffb6c1; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        header { background-color: #ff9cbd; padding: 70px 20px 20px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        h1 { color: #5c001f; margin: 0; font-family: 'Pacifico', cursive; font-size: 2em; }
        
        /* Ruleta */
        .contenedor-ruleta { display: flex; flex-direction: column; align-items: center; margin: 20px auto; }
        .ruleta { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: conic-gradient(#ff6f9c 0deg 72deg, #ff9cbd 72deg 144deg, #ffb6c1 144deg 216deg, #e62e6b 216deg 288deg, #5c001f 288deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            border: 5px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .boton-girar { 
            margin-top: 20px; padding: 15px 40px; background: #5c001f; color: white; border: none; border-radius: 50px; 
            font-family: 'Pacifico', cursive; font-size: 1.2em; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Lo demás igual */
        @keyframes moverseLoco { 0% { transform: translate(0, 0); } 50% { transform: translate(5px, -5px); } 100% { transform: translate(0, 0); } }
        .seccion { background: white; margin: 15px auto; width: 90%; max-width: 500px; border-radius: 50px; cursor: pointer; animation: moverseLoco 3s ease-in-out infinite; }
        .titulo-seccion { color: #e62e6b; padding: 15px; font-weight: bold; font-family: 'Pacifico', cursive; font-size: 1.1em; }
        .contenido { display: none; padding: 0 20px 15px 20px; color: #4a1525; font-size: 0.9em; }
        .boton-cita { background-color: #5c001f; color: white; border: none; padding: 15px 30px; border-radius: 50px; margin: 20px auto; display: block; font-family: 'Pacifico', cursive; animation: moverseLoco 3s ease-in-out infinite; }
        .seccion:hover, .boton-cita:hover { animation: none; transform: scale(1.03); }
    </style>
</head>
<body>
    <header><h1>Estudio de Belleza Armaliet</h1></header>

    <!-- Ruleta -->
    <div class="contenedor-ruleta">
        <div class="ruleta" id="ruleta"></div>
        <button class="boton-girar" onclick="girar()">¡Girar Ruleta!</button>
    </div>

    <div class="seccion" onclick="toggle(this)"><div class="titulo-seccion">▼ Políticas</div><div class="contenido">Anticipo 50%. Tolerancia 10 min. Avisar 24h antes.</div></div>
    <div class="seccion" onclick="toggle(this)"><div class="titulo-seccion">▼ Pestañas</div><div class="contenido">Clásicas: $450 | Vol: $650 | Lift: $400</div></div>
    <div class="seccion" onclick="toggle(this)"><div class="titulo-seccion">▼ Uñas</div><div class="contenido">Básico: $350 | Acrílico: $500 | Gel: $250</div></div>

    <button class="boton-cita" onclick="window.open('https://wa.me/524443372745?text=¡Hola!%20Gané%20un%20premio%20en%20la%20ruleta%20y%20quiero%20agendar.', '_blank')">
        Agendar Cita Ahora
    </button>

    <script>
        function toggle(el) { el.querySelector('.contenido').style.display = (el.querySelector('.contenido').style.display === "block") ? "none" : "block"; }
        
        let rotacion = 0;
        function girar() {
            const ruleta = document.getElementById('ruleta');
            const premio = Math.floor(Math.random() * 5); // 5 premios
            rotacion += 1440 + (premio * 72); // 4 vueltas completas + la sección
            ruleta.style.transform = rotate(${rotacion}deg);
            
            setTimeout(() => {
                const premios = ["10% de descuento", "Diseño extra gratis", "Aplicación a mitad de precio", "Kit de cuidado", "¡Inténtalo de nuevo!"];
                alert("¡Felicidades! Ganaste: " + premios[premio]);
            }, 4000);
        }
    </script>
</body>
</html>
